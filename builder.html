<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RoadBlock Builder (PC)</title>
  <style>
    :root{
      --bg:#0b1533;
      --ink:#eaf0ff;
      --muted:rgba(234,240,255,.68);
      --good:#49e2a8;
      --bad:#ff5a6a;
      --warn:#ffd35a;
      --accent:#5b7cff;

      --gap: 12px;
      --pad: 14px;
      --radius: 18px;

      --sideW: 460px;

      /* JS sets these */
      --boardOuter: 520px;
      --cell: 80px;
      --boardPad: 10px;

      --palRowH: 150px; /* JS overrides */
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden; /* main UI fixed */
    }

    #app{
      height:100vh;
      padding: var(--pad);
      box-sizing:border-box;
      display:grid;
      grid-template-rows: auto auto 1fr;
      gap: var(--gap);
      overflow:hidden;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      min-width:0;
      user-select:none;
    }
    header .title{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }
    header h1{
      margin:0;
      font-size:18px;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    header .sub{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btnbar{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    button{
      appearance:none;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: var(--ink);
      padding: 9px 12px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      user-select:none;
      white-space: nowrap;
    }
    button:active{ transform: translateY(1px); }
    button.primary{ border-color: rgba(91,124,255,.5); background: rgba(91,124,255,.18); }
    button.good{ border-color: rgba(73,226,168,.55); background: rgba(73,226,168,.14); }
    button.warn{ border-color: rgba(255,211,90,.55); background: rgba(255,211,90,.14); }
    button.danger{ border-color: rgba(255,90,106,.55); background: rgba(255,90,106,.16); }
    button.ghost{ background: transparent; border-color: rgba(255,255,255,.14); }

    .card{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 10px 28px rgba(0,0,0,.25);
      overflow:hidden;
      min-height:0;
    }

    #statusCard{ padding: 10px 12px; }
    #msg{
      font-weight: 950;
      letter-spacing:.2px;
      line-height:1.15;
      margin-bottom: 4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    #msg.ok{ color: var(--good); }
    #msg.bad{ color: var(--bad); }
    #hint{
      color:var(--muted);
      font-size:12px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    main{
      display:grid;
      grid-template-columns: 1fr var(--sideW);
      gap: var(--gap);
      min-height:0;
      overflow:hidden;
      align-items: stretch;
    }

    /* Board */
    #boardWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 12px;
      height: 100%;
    }
    #board{
      position:relative;
      width: var(--boardOuter);
      height: var(--boardOuter);
      padding: var(--boardPad);
      border-radius: calc(var(--radius) + 6px);
      border: 1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(900px 500px at 50% -20%, rgba(93,120,255,.22), transparent 55%),
        radial-gradient(700px 520px at 15% 0%, rgba(255,80,180,.14), transparent 52%),
        rgba(255,255,255,.04);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      user-select:none;
    }
    .grid{
      position:absolute;
      left: var(--boardPad);
      top: var(--boardPad);
      width: calc(var(--cell) * 6);
      height: calc(var(--cell) * 6);
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      border-radius: 14px;
      overflow:hidden;
    }
    .cell{
      border: 1px solid rgba(234,240,255,.18);
      box-sizing:border-box;
      background: rgba(20,40,90,.22);
      cursor:pointer;
    }

    .layer{
      position:absolute;
      left: var(--boardPad);
      top: var(--boardPad);
      width: calc(var(--cell) * 6);
      height: calc(var(--cell) * 6);
      pointer-events:none;
    }
    .block{
      position:absolute;
      width: var(--cell);
      height: var(--cell);
      border-radius: 12px;
    }

    .bldg{
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.02)),
        rgba(26,36,70,.84);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.16),
        inset 0 0 0 5px rgba(0,0,0,.12),
        0 14px 22px rgba(0,0,0,.34);
    }
    .bldg::after{
      content:"";
      position:absolute;
      inset: 10%;
      border-radius: 9px;
      background:
        repeating-linear-gradient(0deg, rgba(255,235,160,.13) 0 3px, transparent 3px 10px),
        repeating-linear-gradient(90deg, rgba(255,235,160,.10) 0 3px, transparent 3px 10px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.10);
      opacity:.95;
    }

    .car{
      background: rgba(255,90,106,.18);
      box-shadow:
        inset 0 0 0 2px rgba(255,90,106,.60),
        0 12px 20px rgba(0,0,0,.35);
      border-radius: 14px;
    }
    .carIcon{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: calc(var(--cell) * .60);
      transform-origin: 50% 50%;
      filter: drop-shadow(0 6px 6px rgba(0,0,0,.35));
    }

    .ghost{ opacity:.55; }
    .anchorDot{
      position:absolute;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(73,226,168,.95);
      box-shadow: 0 0 0 2px rgba(0,0,0,.30), 0 0 0 4px rgba(73,226,168,.22);
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
    }

    /* Side panel */
    #side{
      height:100%;
      display:flex;
      flex-direction:column;
      gap: 10px;
      min-height:0;
      overflow:hidden;
    }

    .sectionHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background: rgba(14,24,55,.55);
      border: 1px solid rgba(255,255,255,.08);
      padding: 8px 10px;
      border-radius: 14px;
      user-select:none;
      flex: 0 0 auto;
    }
    .sectionHeader .ttl{ font-weight: 950; }
    .sectionHeader .meta{ color: var(--muted); font-size:12px; font-weight:900; white-space:nowrap; }

    #palette{
      flex: 0 0 auto;
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      grid-auto-rows: var(--palRowH);
      gap: 10px;
      overflow:hidden;
    }

    .pieceBtn{
      text-align:left;
      padding:10px;
      border-radius:14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
      overflow:hidden;
    }
    .pieceBtn.sel{
      outline: 2px solid rgba(91,124,255,.60);
      border-color: rgba(91,124,255,.45);
      background: rgba(91,124,255,.14);
    }
    .pieceTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      min-width:0;
    }
    .pieceName{
      font-weight:950;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pieceMeta{
      color:var(--muted);
      font-size:11px;
      font-weight:950;
      flex:0 0 auto;
      white-space:nowrap;
    }

    .mini{
      flex: 1 1 auto;
      border-radius: 12px;
      background: rgba(0,0,0,.16);
      border: 1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      aspect-ratio: 1 / 1;
      position:relative;
    }
    .mini svg{ width:92%; height:92%; display:block; }
    .mini .anchorBadge{
      position:absolute;
      right: 10px;
      bottom: 10px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(73,226,168,.95);
      box-shadow: 0 0 0 2px rgba(0,0,0,.28), 0 0 0 4px rgba(73,226,168,.20);
    }

    /* Puzzle panel */
    #puzPanel{
      flex: 1 1 auto;
      min-height:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    #puzBtns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      flex: 0 0 auto;
    }
    #puzList{
      flex: 1 1 auto;
      min-height:0;
      overflow:auto;               /* allow scrolling puzzles */
      scrollbar-gutter: stable;    /* prevents layout jump */
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding-right: 2px;
    }
    .puzItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      user-select:none;
      cursor:pointer;
      min-width:0;
    }
    .puzItem.sel{
      outline: 2px solid rgba(91,124,255,.60);
      border-color: rgba(91,124,255,.45);
      background: rgba(91,124,255,.14);
    }
    .puzItem .left{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .puzItem .name{
      font-weight:950;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .puzItem .small{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Help modal */
    #modalBackdrop{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index: 9999;
    }
    #modalBackdrop.open{ display:flex; }
    #modal{
      width: min(860px, 100%);
      max-height: min(84vh, 820px);
      background: rgba(16,26,58,.92);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      box-shadow: 0 28px 80px rgba(0,0,0,.55);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    #modalHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
    }
    #modalHeader .ttl{ font-weight:950; letter-spacing:.2px; }
    #modalBody{
      padding: 12px;
      overflow:auto;
      color: rgba(234,240,255,.90);
      font-size: 13px;
      line-height:1.35;
      white-space:pre-wrap;
    }

    #fileInput{ display:none; }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <div class="title">
        <h1>RoadBlock Builder (PC)</h1>
        <div class="sub">6×6 • 4 korttelia + punainen auto • rotaatio 90° • ankkuri + älykäs sijoitus • pulmalista scrollaa</div>
      </div>
      <div class="btnbar">
        <button class="ghost" id="btnHelp">Ohjeet</button>
        <button class="warn" id="btnClear">Tyhjennä</button>
        <button class="good" id="btnSolve" title="Hae poliisien sijoitus joka estää punaisen auton paon">Solve</button>
        <span id="solveOut" class="solveOut"></span>
        <button class="primary" id="btnSaveJson">Tallenna JSON</button>
        <button class="primary" id="btnLoadJson">Lataa JSON</button>
      </div>
    </header>

    <div class="card" id="statusCard">
      <div id="solutionsPanel" style="display:flex; flex-direction:column; gap:6px; max-height:120px; overflow-y:auto;">
        <div style="color:rgba(234,240,255,.55); font-size:12px; font-weight:900;">Aseta palat laudalle ja paina Solve.</div>
      </div>
    </div>

    <main>
      <div id="boardWrap" class="card">
        <div id="board" aria-label="builder-lauta">
          <div class="grid" id="grid"></div>
          <div class="layer" id="layer"></div>
        </div>
      </div>

      <aside id="side" class="card">
        <div class="sectionHeader">
          <div class="ttl">Paletti</div>
          <div class="meta" id="palMeta">valitse pala</div>
        </div>

        <div id="palette"></div>

        <div id="puzPanel">
          <div class="sectionHeader">
            <div class="ttl">Pulmat</div>
            <div class="meta" id="puzMeta">0 kpl</div>
          </div>

          <div id="puzBtns">
            <button class="danger" id="btnNew">Uusi pulma</button>
            <button class="good" id="btnAdd">Lisää</button>
            <button class="primary" id="btnRename">Nimeä</button>
            <button class="primary" id="btnUpdate">Päivitä</button>
            <button class="ghost" id="btnLoad">Lataa</button>
            <button class="warn" id="btnDelete">Poista</button>
          </div>

          <div id="puzList"></div>
        </div>
      </aside>
    </main>
  </div>

  <input id="fileInput" type="file" accept=".json,application/json" />

  <div id="modalBackdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div id="modal">
      <div id="modalHeader">
        <div class="ttl">Ohjeet</div>
        <button class="ghost" id="btnModalClose">Sulje</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

<script>
(() => {
  const elGrid = document.getElementById("grid");
  const elLayer = document.getElementById("layer");
  const elMsg = document.getElementById("msg");
  const elHint = document.getElementById("hint");
  const elPalette = document.getElementById("palette");
  const elPalMeta = document.getElementById("palMeta");
  const elPuzMeta = document.getElementById("puzMeta");
  const elPuzList = document.getElementById("puzList");
  const elFile = document.getElementById("fileInput");

  const BUILDINGS = [
    { id:"b1", name:"Rakennus 1", kind:"bldg", shape:["xx","x-"] },
    { id:"b2", name:"Rakennus 2", kind:"bldg", shape:["xxx","--x"] },
    { id:"b3", name:"Rakennus 3", kind:"bldg", shape:["xxx","x--"] },
    { id:"b4", name:"Rakennus 4", kind:"bldg", shape:["xxx"] },
  ];

  // Police tiles (same as in the game runtime)
const POLICE = [
  { id:"p1", name:"Poliisi 1", shape:["xp","x-"] },
  { id:"p2", name:"Poliisi 2", shape:["xp","-x"] },
  { id:"p3", name:"Poliisi 3", shape:["xxp","--x"] },
  { id:"p4", name:"Poliisi 4", shape:["xxp","x--"] },
  { id:"p5", name:"Poliisi 5", shape:["xxx","-p-"] },
  { id:"p6", name:"Poliisi 6", shape:["xpx"] },
];

  const CAR = { id:"car", name:"Punainen auto", kind:"car", shape:["x"] };
  const PIECES = [...BUILDINGS, CAR];

  const W=6, H=6;
  const LS_KEY = "roadblock_builder_pc_v3";

  const S = {
    buildings: [
      { bid:"b1", x:null, y:null, rot:0 },
      { bid:"b2", x:null, y:null, rot:0 },
      { bid:"b3", x:null, y:null, rot:0 },
      { bid:"b4", x:null, y:null, rot:0 },
    ],
    car: { x:null, y:null, rot:0 },
    selId: null,
    selRot: { b1:0, b2:0, b3:0, b4:0, car:0 },
    puzzles: [],
    selectedPuzzle: -1,
    _ghost: null,
  };

  function setMsg(txt, kind){ /* statusCard now used for solutions */ }
  function setHint(txt){ }

  function rotateShape(shape){
    const h = shape.length, w = shape[0].length;
    const g = shape.map(r=>r.split(""));
    const out = [];
    for(let x=0;x<w;x++){
      let row="";
      for(let y=h-1;y>=0;y--) row += g[y][x];
      out.push(row);
    }
    return out;
  }
  function rotShape(shape, rot){
    let s = shape;
    for(let i=0;i<rot;i++) s = rotateShape(s);
    return s;
  }
  function shapeCells(shape){
    const out=[];
    for(let y=0;y<shape.length;y++){
      for(let x=0;x<shape[0].length;x++){
        if(shape[y][x] !== "-") out.push({x,y});
      }
    }
    return out;
  }

  // ---------------- Solver ----------------
  // 6x6 = 36 solua -> JS bitwise on 32-bit -> KÄYTETÄÄN Set<number> bitmaskien sijaan

  function cellKey(x,y){ return y*W+x; }

  function findP(shape){
    for(let y=0;y<shape.length;y++)
      for(let x=0;x<shape[0].length;x++)
        if(shape[y][x]==="p") return {x,y};
    return null;
  }

  function enumeratePolicePlacements(){
    const out = {};
    for(const p of POLICE){
      out[p.id] = [];
      // Deduplicate rotations: skip if this rotation produces identical shape as an earlier one
      const seenShapes = new Set();
      for(let rot=0; rot<4; rot++){
        const s = rotShape(p.shape, rot);
        const shapeKey = s.join("|");
        if(seenShapes.has(shapeKey)) continue;
        seenShapes.add(shapeKey);

        const h = s.length, w = s[0].length;
        const p0 = findP(s);
        if(!p0) continue;

        for(let oy=0; oy<=H-h; oy++){
          for(let ox=0; ox<=W-w; ox++){
            // occSet: kaikki palikan solut; pSet: vain poliisin (p) solut
            const occSet = new Set();
            const pSet   = new Set();

            for(let yy=0; yy<h; yy++){
              for(let xx=0; xx<w; xx++){
                const ch = s[yy][xx];
                if(ch==="-") continue;
                const key = cellKey(ox+xx, oy+yy);
                occSet.add(key);
                if(ch==="p") pSet.add(key);
              }
            }

            out[p.id].push({
              rot,
              occSet,
              pSet,
              px: ox + p0.x,
              py: oy + p0.y,
            });
          }
        }
      }
    }
    return out;
  }

  let POL_PL = null;
  function ensurePolicePlacements(){
    if(!POL_PL) POL_PL = enumeratePolicePlacements();
  }

  function buildingOccSet(){
    const s = new Set();
    for(const b of S.buildings){
      if(b.x==null||b.y==null) continue;
      const def = BUILDINGS.find(bb=>bb.id===b.bid);
      const sh = rotShape(def.shape, b.rot||0);
      for(const c of shapeCells(sh)){
        const gx=b.x+c.x, gy=b.y+c.y;
        if(gx>=0&&gx<W&&gy>=0&&gy<H) s.add(cellKey(gx,gy));
      }
    }
    return s;
  }

  function setsOverlap(setA, setB){
    // käy läpi pienempi
    const [small, big] = setA.size <= setB.size ? [setA, setB] : [setB, setA];
    for(const k of small) if(big.has(k)) return true;
    return false;
  }

  function unionSets(...sets){
    const out = new Set();
    for(const s of sets) for(const k of s) out.add(k);
    return out;
  }

  // Auto liikkuu kaikkiin 4 diagonaalisuuntaan (no corner-cut) + 4 ortogonaaliseen suuntaan
  const DIAG_DIRS = [
    {dx: 1, dy: 1},
    {dx: 1, dy:-1},
    {dx:-1, dy: 1},
    {dx:-1, dy:-1}
  ];
  const ORTHO_DIRS = [
    {dx: 1, dy: 0},
    {dx:-1, dy: 0},
    {dx: 0, dy: 1},
    {dx: 0, dy:-1}
  ];
  const ALL_DIRS = [...DIAG_DIRS, ...ORTHO_DIRS];

  function carCanEscapeGiven(blockedSet){
    function inside(x,y){ return x>=0&&x<W&&y>=0&&y<H; }
    function isBlocked(x,y){ return inside(x,y) && blockedSet.has(cellKey(x,y)); }
    function canStepOutside(x,y){
      for(const d of ALL_DIRS){
        if(!inside(x+d.dx, y+d.dy)) return true;
      }
      return false;
    }

    const q = [{x:S.car.x, y:S.car.y}];
    const seen = new Set([cellKey(S.car.x, S.car.y)]);

    while(q.length){
      const cur = q.shift();
      if(canStepOutside(cur.x, cur.y)) return true;

      for(const d of ALL_DIRS){
        const nx=cur.x+d.dx, ny=cur.y+d.dy;
        if(!inside(nx,ny)) continue;
        if(isBlocked(nx,ny)) continue;
        // Diagonaalisille: no corner-cut
        if(d.dx!==0 && d.dy!==0){
          if(isBlocked(cur.x+d.dx, cur.y) && isBlocked(cur.x, cur.y+d.dy)) continue;
        }
        const k=cellKey(nx,ny);
        if(seen.has(k)) continue;
        seen.add(k);
        q.push({x:nx,y:ny});
      }
    }
    return false;
  }

  async function solvePoliceForCurrentBase(progressEl=null){
    ensurePolicePlacements();

    if(S.car.x==null||S.car.y==null)
      return {count:0, oneSolution:null, reason:"Aseta punainen auto ensin."};
    for(const b of S.buildings)
      if(b.x==null||b.y==null)
        return {count:0, oneSolution:null, reason:"Aseta kaikki 4 korttelia ensin."};

    const bldgSet  = buildingOccSet();
    const baseSet  = unionSets(bldgSet, new Set([cellKey(S.car.x,S.car.y)]));

    const pids = POLICE.map(p=>p.id).slice().sort((a,b)=> POL_PL[a].length - POL_PL[b].length);

    console.log("=== Solver käynnistyy ===");
    for(const pid of pids)
      console.log(`  ${pid}: ${POL_PL[pid].length} sijoitusvaihtoehtoa`);
    console.log(`  Rakennukset+auto varaavat ${baseSet.size} solua, vapaana ${W*H-baseSet.size}`);

    let count=0, leafCount=0, escapedCount=0, blockedCount=0;
    let oneSolution=null;
    const allSolutions=[];
    const chosen={};
    let lastYield=Date.now();

    async function bt(i, occSet, pSet){
      const now=Date.now();
      if(now-lastYield>50){
        lastYield=now;
        if(progressEl) progressEl.textContent=`Solving… ${leafCount} asetelmaa, ${blockedCount} blokkaavaa`;
        await new Promise(r=>setTimeout(r,0));
      }

      if(i===pids.length){
        leafCount++;
        // Blokkauksessa: rakennukset + poliisin p-solut
        const escapeBlocked = unionSets(bldgSet, pSet);
        if(!carCanEscapeGiven(escapeBlocked)){
          blockedCount++;
          count++;
          const sol={};
          for(const pid of pids){ const pl=chosen[pid]; sol[pid]={x:pl.px, y:pl.py, rot:pl.rot}; }
          allSolutions.push(sol);
          if(count===1) oneSolution=sol;
          console.log(`${count}. ratkaisu:`, JSON.stringify(sol));
        } else {
          escapedCount++;
        }
        return false;
      }

      const pid=pids[i];
      const pls=POL_PL[pid];
      const n=pls.length;

      let tried=0;
      for(let k=0;k<n;k++){
        const pl=pls[k];
        // Tarkista päällekkäisyys: palikan kaikki solut vs jo varatut
        if(setsOverlap(pl.occSet, occSet)) continue;
        tried++;
        chosen[pid]=pl;
        const newOcc=unionSets(occSet, pl.occSet);
        const newP  =unionSets(pSet,   pl.pSet);
        if(await bt(i+1, newOcc, newP)) return true;
        delete chosen[pid];
      }
      // Jos tried===0: tälle palalle ei löytynyt yhtään paikkaa -> prune (hyvä!)
      return false;
    }

    await bt(0, baseSet, new Set());

    console.log("=== Solver valmis ===");
    console.log(`  Täysiä asetelmia: ${leafCount}`);
    console.log(`  Auto pakeni:      ${escapedCount}`);
    console.log(`  Auto blokattiin:  ${blockedCount}`);
    return {count, oneSolution, allSolutions, reason:null, stats:{leafCount,escapedCount,blockedCount}};
  }

  function anchorOf(shape){
    let best=null;
    for(const c of shapeCells(shape)){
      if(!best) best = {x:c.x,y:c.y};
      else if(c.y < best.y || (c.y===best.y && c.x < best.x)) best = {x:c.x,y:c.y};
    }
    return best || {x:0,y:0};
  }

    const Hh = header.getBoundingClientRect().height;
    const Hs = status.getBoundingClientRect().height;

    const availH = window.innerHeight - pad*2 - gap*2 - Hh - Hs;
    const availW = window.innerWidth  - pad*2 - gap   - sideW;

    const boardPad = 10;
    let boardOuter = Math.floor(Math.min(availH, availW) - 24);
    boardOuter = Math.max(360, Math.min(760, boardOuter));
    const cell = Math.floor((boardOuter - boardPad*2) / 6);

    document.documentElement.style.setProperty("--boardPad", boardPad + "px");
    document.documentElement.style.setProperty("--boardOuter", (cell*6 + boardPad*2) + "px");
    document.documentElement.style.setProperty("--cell", cell + "px");

      const puzHeaderH = headers[1].getBoundingClientRect().height;

      const internalGaps = 10*3 + 12*2;
      let palArea = sideH - palHeaderH - puzHeaderH - puzBtnsH - internalGaps - 220;
      palArea = Math.max(260, palArea);

      let rowH = Math.floor((palArea - 10*2) / 3);
      rowH = Math.max(120, Math.min(220, rowH));

  function emptyOcc(){
    return Array.from({length:H}, ()=> Array.from({length:W}, ()=> null));
  }
  function canPlace(occ, shape, ox, oy){
    for(const c of shapeCells(shape)){
      const x = ox + c.x, y = oy + c.y;
      if(x<0||x>=W||y<0||y>=H) return false;
      if(occ[y][x]) return false;
    }
    return true;
  }
  function stamp(occ, shape, ox, oy, tag){
    for(const c of shapeCells(shape)){
      const x = ox + c.x, y = oy + c.y;
      if(x>=0&&x<W&&y>=0&&y<H) occ[y][x] = tag;
    }
  }
  function buildOccExcluding(excludeId){
    const occ = emptyOcc();
    for(const b of S.buildings){
      if(b.bid===excludeId) continue;
      if(b.x==null||b.y==null) continue;
      const def = BUILDINGS.find(bb=>bb.id===b.bid);
      const sh = rotShape(def.shape, b.rot||0);
      stamp(occ, sh, b.x, b.y, b.bid);
    }
    if(excludeId!=="car" && S.car.x!=null && S.car.y!=null){
      occ[S.car.y][S.car.x] = "car";
    }
    return occ;
  }

  function pieceAtCell(x,y){
    for(const b of S.buildings){
      if(b.x==null||b.y==null) continue;
      const def = BUILDINGS.find(bb=>bb.id===b.bid);
      const sh = rotShape(def.shape, b.rot||0);
      for(const c of shapeCells(sh)){
        if(b.x+c.x===x && b.y+c.y===y) return b.bid;
      }
    }
    if(S.car.x===x && S.car.y===y) return "car";
    return null;
  }

  function smartPlace(shape, anchor, occ, targetX, targetY){
    const baseOx = targetX - anchor.x;
    const baseOy = targetY - anchor.y;
    if(canPlace(occ, shape, baseOx, baseOy)) return {ax:targetX, ay:targetY};

    const MAX_R=3;
    for(let r=1;r<=MAX_R;r++){
      const candidates=[];
      for(let dy=-r; dy<=r; dy++){
        const dx = r - Math.abs(dy);
        candidates.push({dx:+dx, dy});
        if(dx!==0) candidates.push({dx:-dx, dy});
      }
      for(const c of candidates){
        const ax = targetX + c.dx;
        const ay = targetY + c.dy;
        const ox = ax - anchor.x;
        const oy = ay - anchor.y;
        if(canPlace(occ, shape, ox, oy)) return {ax,ay};
      }
    }
    return null;
  }

  function clearLayer(){ elLayer.innerHTML=""; }
  function addBlock(x,y,cls,inner){
    const d=document.createElement("div");
    d.className = "block " + cls;
    d.style.left = `calc(var(--cell) * ${x})`;
    d.style.top  = `calc(var(--cell) * ${y})`;
    if(inner) d.appendChild(inner);
    elLayer.appendChild(d);
  }

  function renderAll(){
    clearLayer();

    for(const b of S.buildings){
      if(b.x==null||b.y==null) continue;
      const def = BUILDINGS.find(bb=>bb.id===b.bid);
      const sh = rotShape(def.shape, b.rot||0);
      const a = anchorOf(sh);

      for(const c of shapeCells(sh)){
        addBlock(b.x+c.x, b.y+c.y, "bldg");
      }
      addBlock(b.x+a.x, b.y+a.y, "ghost", (()=>{ const s=document.createElement("div"); s.className="anchorDot"; return s; })());
    }

    if(S.car.x!=null && S.car.y!=null){
      const inner=document.createElement("div");
      inner.className="carIcon";
      inner.textContent="🚗";
      inner.style.transform = `rotate(${45 + (S.car.rot||0)*90}deg)`;
      addBlock(S.car.x, S.car.y, "car", inner);
      addBlock(S.car.x, S.car.y, "ghost", (()=>{ const s=document.createElement("div"); s.className="anchorDot"; return s; })());
    }

    if(S.selId && S._ghost && S._ghost.pid===S.selId){
      const pid=S.selId;
      const rot=S.selRot[pid]||0;
      const def = (pid==="car") ? CAR : BUILDINGS.find(b=>b.id===pid);
      const sh=rotShape(def.shape, rot);
      const a=anchorOf(sh);
      const occ=buildOccExcluding(pid);
      const best=smartPlace(sh,a,occ,S._ghost.ax,S._ghost.ay);
      const ax=best?best.ax:S._ghost.ax;
      const ay=best?best.ay:S._ghost.ay;
      // ax/ay on ankkuri, muunna vasen yläkulma
      const ox=ax-a.x, oy=ay-a.y;

      for(const c of shapeCells(sh)){
        addBlock(ox+c.x, oy+c.y, (def.kind==="car" ? "car ghost" : "bldg ghost"));
      }
      addBlock(ax, ay, "ghost", (()=>{ const s=document.createElement("div"); s.className="anchorDot"; return s; })());
    }
  }

  const PREVIEW_DIM=3;
  function makePreviewSVG(pid, shape, anchor, rot){
    const rows=shape.length, cols=shape[0].length;
    const offX=(PREVIEW_DIM-cols)/2, offY=(PREVIEW_DIM-rows)/2;
    const svgNS="http://www.w3.org/2000/svg";
    const svg=document.createElementNS(svgNS,"svg");
    svg.setAttribute("viewBox",`0 0 ${PREVIEW_DIM} ${PREVIEW_DIM}`);
    svg.setAttribute("preserveAspectRatio","xMidYMid meet");

    for(let y=0;y<PREVIEW_DIM;y++){
      for(let x=0;x<PREVIEW_DIM;x++){
        const bg=document.createElementNS(svgNS,"rect");
        bg.setAttribute("x",String(x+0.06));
        bg.setAttribute("y",String(y+0.06));
        bg.setAttribute("width","0.88");
        bg.setAttribute("height","0.88");
        bg.setAttribute("rx","0.18");
        bg.setAttribute("fill","rgba(255,255,255,0.03)");
        bg.setAttribute("stroke","rgba(255,255,255,0.06)");
        bg.setAttribute("stroke-width","0.04");
        svg.appendChild(bg);
      }
    }

    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        if(shape[y][x]==="-") continue;
        const xx=x+offX, yy=y+offY;
        const r=document.createElementNS(svgNS,"rect");
        r.setAttribute("x",String(xx+0.10));
        r.setAttribute("y",String(yy+0.10));
        r.setAttribute("width","0.80");
        r.setAttribute("height","0.80");
        r.setAttribute("rx","0.18");
        r.setAttribute("fill","rgba(255,255,255,0.10)");
        r.setAttribute("stroke","rgba(255,255,255,0.18)");
        r.setAttribute("stroke-width","0.06");
        svg.appendChild(r);
      }
    }

    if(pid==="car"){
      const t=document.createElementNS(svgNS,"text");
      t.setAttribute("x","1.5");
      t.setAttribute("y","1.5");
      t.setAttribute("text-anchor","middle");
      t.setAttribute("dominant-baseline","central");
      t.setAttribute("font-size","1.35");
      t.textContent="🚗";
      t.setAttribute("transform",`rotate(${45 + rot*90} 1.5 1.5)`);
      svg.appendChild(t);
    }

    const ax=anchor.x+offX+0.5, ay=anchor.y+offY+0.5;
    const c=document.createElementNS(svgNS,"circle");
    c.setAttribute("cx",String(ax));
    c.setAttribute("cy",String(ay));
    c.setAttribute("r","0.10");
    c.setAttribute("fill","rgba(73,226,168,0.95)");
    svg.appendChild(c);

    return svg;
  }

  function placedInfo(pid){
    if(pid==="car") return (S.car.x!=null) ? `@(${S.car.x},${S.car.y})` : "ei laudalla";
    const b=S.buildings.find(bb=>bb.bid===pid);

  function onCellClick(x,y){
    const hit=pieceAtCell(x,y);
    if(hit){
      if(hit==="car"){
        S.car.x=null; S.car.y=null; S.car.rot=0;
        setMsg("Auto poistettu.", "ok");
      }else{
        const b=S.buildings.find(bb=>bb.bid===hit);
        if(b){ b.x=null; b.y=null; b.rot=0; }
        setMsg(`${BUILDINGS.find(bb=>bb.id===hit)?.name || hit} poistettu.`, "ok");
      }
      saveLS();
      renderPalette();
      renderAll();
      return;
    }

    if(!S.selId){
      setMsg("Valitse ensin pala paletista.", "");
      return;
    }

    const pid=S.selId;
    const rot=S.selRot[pid]||0;
    const def=(pid==="car")?CAR:BUILDINGS.find(b=>b.id===pid);
    const sh=rotShape(def.shape, rot);
    const a=anchorOf(sh);

    const occ=buildOccExcluding(pid);
    const best=smartPlace(sh,a,occ,x,y);
    if(!best){
      setMsg("Ei mahdu tuohon (reuna / päällekkäisyys).", "bad");
      return;
    }

    if(pid==="car"){
      S.car.x=best.ax; S.car.y=best.ay; S.car.rot=rot;
      setMsg(`Auto asetettu: (${S.car.x},${S.car.y}) rot ${rot*90}°`, "ok");
    }else{
      const b=S.buildings.find(bb=>bb.bid===pid);
      // smartPlace palauttaa ankkurin, muunna vasemmaksi yläkulmaksi
      const a=anchorOf(sh);
      b.x=best.ax-a.x; b.y=best.ay-a.y; b.rot=rot;
      setMsg(`${def.name} asetettu: (${b.x},${b.y}) rot ${rot*90}°`, "ok");
    }

    saveLS();
    renderPalette();
    renderAll();
  }

  function currentPuzzleObject(name){
    if(S.car.x==null || S.car.y==null) return {ok:false, msg:"Auto puuttuu laudalta."};
    for(const b of S.buildings){
      if(b.x==null || b.y==null) return {ok:false, msg:`${BUILDINGS.find(bb=>bb.id===b.bid).name} puuttuu laudalta.`};
    }
    return {
      ok:true,
      obj:{
        name: name || `pulma ${S.puzzles.length+1}`,
        car:{x:S.car.x,y:S.car.y,rot:S.car.rot||0},
        buildings:S.buildings.map(b=>({bid:b.bid, x:b.x, y:b.y, rot:b.rot||0}))
      }
    };
  }

  function normalizePuzzle(pz){
    const b=[...pz.buildings].sort((a,b)=>String(a.bid).localeCompare(String(b.bid)));
    return {
      car:{x:+pz.car.x,y:+pz.car.y,rot:(+pz.car.rot)||0},
      buildings:b.map(bb=>({bid:String(bb.bid),x:+bb.x,y:+bb.y,rot:(+bb.rot)||0}))
    };
  }
  function samePuzzle(a,b){
    return JSON.stringify(normalizePuzzle(a))===JSON.stringify(normalizePuzzle(b));
  }
  function autoSaveCurrentIfValid(){
    const res=currentPuzzleObject();
    if(!res.ok) return false;
    const cur=res.obj;
    const last=S.puzzles.length?S.puzzles[S.puzzles.length-1]:null;
    if(last && samePuzzle(cur,last)) return false;
    cur.name = `pulma ${S.puzzles.length+1}`;
    S.puzzles.push(cur);
    S.selectedPuzzle = S.puzzles.length-1;
    renderPuzzleList();
    saveLS();
    return true;
  }

  function loadPuzzleToBoard(pz){
    for(const b of S.buildings){ b.x=null; b.y=null; b.rot=0; }
    S.car.x=null; S.car.y=null; S.car.rot=0;

    S.car.x=+pz.car.x; S.car.y=+pz.car.y; S.car.rot=(+pz.car.rot)||0;
    for(const bb of pz.buildings){
      const b=S.buildings.find(x=>x.bid===bb.bid);
      if(b){
        // JSON ja sisäinen formaatti: vasen yläkulma
        b.x=+bb.x; b.y=+bb.y; b.rot=(+bb.rot)||0;
      }
    }
    S.selRot.car=S.car.rot||0;
    for(const b of S.buildings) S.selRot[b.bid]=b.rot||0;
  }

    }
    loadPuzzleToBoard(S.puzzles[S.selectedPuzzle]);
    setMsg(`Ladattu: ${S.puzzles[S.selectedPuzzle].name}`,"ok");
    saveLS(); renderPalette(); renderAll();
  });

  document.getElementById("btnDelete").addEventListener("click", ()=>{
    if(S.selectedPuzzle<0 || S.selectedPuzzle>=S.puzzles.length){
      setMsg("Valitse ensin pulma listasta.","");
      return;
    }
    const name=S.puzzles[S.selectedPuzzle].name;
    if(!confirm(`Poistetaanko "${name}"?`)) return;
    S.puzzles.splice(S.selectedPuzzle,1);
    S.selectedPuzzle=Math.min(S.selectedPuzzle, S.puzzles.length-1);
    setMsg(`Poistettu: ${name}`,"ok");
    saveLS(); renderPuzzleList();
  });

  function downloadJson(){
    const data=JSON.stringify(S.puzzles,null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="roadblock_puzzles.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    setMsg("JSON tallennettu (roadblock_puzzles.json).","ok");
  }

  document.getElementById("btnSaveJson").addEventListener("click", downloadJson);

  document.getElementById("btnLoadJson").addEventListener("click", ()=>{
    elFile.value="";
    elFile.click();
  });

  elFile.addEventListener("change", async ()=>{
    const f=elFile.files && elFile.files[0];
    if(!f) return;
    try{
      const text=await f.text();
      const data=JSON.parse(text);
      if(!Array.isArray(data)) throw new Error("array expected");

      const clean=[];
      for(const pz of data){
        if(!pz || typeof pz!=="object") continue;
        if(!pz.car || !pz.buildings) continue;
        if(!Array.isArray(pz.buildings) || pz.buildings.length!==4) continue;

        const car={x:+pz.car.x,y:+pz.car.y,rot:(+pz.car.rot)||0};
        if(!Number.isFinite(car.x)||!Number.isFinite(car.y)) continue;

        const b=[];
        let ok=true;
        for(const bb of pz.buildings){
          const bid=String(bb.bid);
          if(!BUILDINGS.some(x=>x.id===bid)){ ok=false; break; }
          const item={bid,x:+bb.x,y:+bb.y,rot:(+bb.rot)||0};
          if(!Number.isFinite(item.x)||!Number.isFinite(item.y)){ ok=false; break; }
          b.push(item);
        }
        if(!ok) continue;

        clean.push({name:String(pz.name||`pulma ${clean.length+1}`), car, buildings:b});
      }

      S.puzzles=clean;
      S.selectedPuzzle = (S.puzzles.length?0:-1);
      setMsg(`Ladattu JSON: ${S.puzzles.length} pulmaa.`,"ok");
      saveLS(); renderPuzzleList();
    }catch(e){
      setMsg("JSON-lataus epäonnistui (tarkista tiedosto).","bad");
    }
  });

  // Help modal
  const elBackdrop=document.getElementById("modalBackdrop");
  const elBody=document.getElementById("modalBody");
  document.getElementById("btnModalClose").addEventListener("click", ()=>{
    elBackdrop.classList.remove("open");
    elBackdrop.setAttribute("aria-hidden","true");
  });
  elBackdrop.addEventListener("click",(ev)=>{
    if(ev.target===elBackdrop){
      elBackdrop.classList.remove("open");
      elBackdrop.setAttribute("aria-hidden","true");
    }
  });
  document.addEventListener("keydown",(ev)=>{
    if(ev.key==="Escape"){
      elBackdrop.classList.remove("open");
      elBackdrop.setAttribute("aria-hidden","true");
    }
  });
  document.getElementById("btnHelp").addEventListener("click", ()=>{
    elBody.textContent =
`Builder (PC)

• Valitse pala paletista.
• Klikkaa ruutua: aseta pala niin, että ankkuripiste osuu ruutuun.
  - Jos ei mahdu, builder etsii lähimmän kelvollisen sijoituksen.
• Klikkaa valittua palettipalaa: pyöräytä 90° (myös auto).
• Klikkaa laudalla olevaa palaa: poista.

Pulmat:
• Uusi pulma: autotallentaa edellisen (jos kelvollinen ja muuttunut) ja tyhjentää laudan.
• Lisää: lisää nykyisen laudan pulmaksi (kysyy nimen).
• Nimeä: nimeää valitun pulman.
• Päivitä: korvaa valitun pulman nykyisellä laudalla.
• Lataa: lataa valitun pulman laudalle.
• Poista: poistaa valitun pulman.

JSON:
• Tallenna JSON: lataa roadblock_puzzles.json.
• Lataa JSON: lukee pulmat tiedostosta ja korvaa nykyisen listan.

Huom:
• Vain pulmalista scrollaa (oikean paneelin alaosa).`;
    elBackdrop.classList.add("open");
    elBackdrop.setAttribute("aria-hidden","false");
  });

  document.getElementById("btnSolve").addEventListener("click", async ()=>{
  const outEl = document.getElementById("solveOut");
  outEl.textContent = "Solving…";

  const r = await solvePoliceForCurrentBase(outEl);
  if(r.reason){
    outEl.textContent = r.reason;
    return;
  }
  const s = r.stats;
  const statsStr = ` | asetelmia: ${s.leafCount}, pakeni: ${s.escapedCount}`;
  if(r.count === 0){
    outEl.textContent = "0 ratkaisua" + statsStr;
  }else if(r.count === 1){
    outEl.textContent = "✓ 1 ratkaisu (uniikki)" + statsStr;
  }else{
    outEl.textContent = `${r.count} ratkaisua (ei uniikki)` + statsStr;
  }

  // Show all solutions in a results panel
  showSolutions(r.allSolutions);
});


  // Show all solver solutions in statusCard
  function showSolutions(solutions){
    const panel = document.getElementById("solutionsPanel");
    panel.innerHTML = "";

    if(!solutions || solutions.length===0){
      panel.innerHTML = '<div style="color:rgba(234,240,255,.55); font-size:12px; font-weight:900;">0 ratkaisua löytyi.</div>';
      return;
    }

    const header = document.createElement("div");
    header.style.cssText = "font-weight:950; font-size:12px; color:rgba(234,240,255,.65); flex-shrink:0;";
    header.textContent = `${solutions.length} ratkaisua — poliisiautojen sijainnit (klikkaa kopioidaksesi):`;
    panel.appendChild(header);

    solutions.forEach((sol, idx) => {
      const row = document.createElement("div");
      row.style.cssText = "background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); border-radius:8px; padding:6px 10px; font-size:11px; font-family:monospace; color:rgba(234,240,255,.85); cursor:pointer; transition:background .15s; flex-shrink:0;";

      const parts = Object.entries(sol).map(([pid, v]) => `${pid}:(${v.x},${v.y}) r${v.rot*90}°`);
      row.textContent = `#${idx+1}  ${parts.join("  ")}`;

      row.addEventListener("mouseenter", ()=> row.style.background="rgba(91,124,255,.18)");
      row.addEventListener("mouseleave", ()=> row.style.background="rgba(255,255,255,.06)");
      row.addEventListener("click", ()=>{
        navigator.clipboard.writeText(JSON.stringify(sol, null, 2)).catch(()=>{});
        row.style.background="rgba(73,226,168,.18)";
        setTimeout(()=> row.style.background="rgba(255,255,255,.06)", 800);
      });

      panel.appendChild(row);
    });
  }

  // LocalStorage
  function saveLS(){
    try{
      localStorage.setItem(LS_KEY, JSON.stringify({
        buildings:S.buildings,
        car:S.car,
        selId:S.selId,
        selRot:S.selRot,
        puzzles:S.puzzles,
        selectedPuzzle:S.selectedPuzzle
      }));
    }catch(e){}
  }
  function loadLS(){
    try{
      const raw=localStorage.getItem(LS_KEY);
      if(!raw) return;
      const d=JSON.parse(raw);
      if(!d || typeof d!=="object") return;
      if(Array.isArray(d.buildings)) S.buildings=d.buildings.map(b=>({bid:b.bid,x:b.x,y:b.y,rot:b.rot||0}));
      if(d.car) S.car={x:d.car.x,y:d.car.y,rot:d.car.rot||0};
      if(d.selRot) S.selRot=Object.assign(S.selRot,d.selRot);
      if(typeof d.selId==="string") S.selId=d.selId;
      if(Array.isArray(d.puzzles)) S.puzzles=d.puzzles;
      if(typeof d.selectedPuzzle==="number") S.selectedPuzzle=d.selectedPuzzle;
    }catch(e){}
  }

  // Init
  loadLS();
  rebuildLayout();
  renderPalette();
  renderPuzzleList();
  renderAll();
  if(!S.selId){ S.selId="car"; renderPalette(); }
})();
</script>
</body>
</html>
